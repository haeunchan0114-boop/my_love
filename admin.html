<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 쓰기</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

/* 🔥 로그인 화면이랑 동일 구조 */
.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.card{
  width:260px;  /* 로그인과 동일 */
  background: rgba(255,255,255,0.12);
  padding:30px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 👉 글쓰기만 크게 */
textarea{
  height:180px;
}

input, textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="title">✍ 글 쓰기</div>

<div class="card">
  <input id="title" placeholder="제목">
  <textarea id="content" placeholder="내용"></textarea>
  <button id="saveBtn">저장</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = localStorage.getItem("editId");

/* 🔥 수정 불러오기 */
window.addEventListener("load", async () => {

  if(editId){
    const snap = await getDoc(doc(db,"글",editId));
    if(snap.exists()){
      const d = snap.data();
      document.getElementById("title").value = d.title;
      document.getElementById("content").value = d.content;
    }
  }
});

/* 🔥 저장 버튼 (이 방식이 제일 안정적) */
document.getElementById("saveBtn").addEventListener("click", savePost);

async function savePost(){

  try{

    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const user = sessionStorage.getItem("user");

    if(!title || !content){
      alert("제목/내용 입력");
      return;
    }

    if(!user){
      alert("로그인 정보 없음");
      return;
    }

    const now = new Date();

    const dateStr =
      `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    if(editId){

      await updateDoc(doc(db,"글",editId),{
        title,
        content
      });

      localStorage.removeItem("editId");

    } else {

      await addDoc(collection(db,"글"),{
        writer:user,
        title,
        content,
        date:dateStr,
        time:Date.now(),
        pinned:false
      });
    }

    window.location.href="home.html";

  } catch(err){
    console.error(err);
    alert("저장 실패 (콘솔 확인)");
  }
}
</script>

</body>
</html>
