<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 쓰는 공간!</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  
  /* 메인·로그인 화면과 완벽히 일치하는 무수한 별빛 밤하늘 배경 */
  background: 
    radial-gradient(circle at 10% 15%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 80px 80px,
    radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 100px 100px,
    radial-gradient(circle at 70% 25%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 90px 90px,
    radial-gradient(circle at 90% 75%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 110px 110px,
    radial-gradient(circle at 25% 65%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 150px 150px,
    radial-gradient(circle at 55% 80%, rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px) 0 0 / 130px 130px,
    radial-gradient(circle at 85% 45%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 160px 160px,
    radial-gradient(circle at 50% 15%, rgba(255, 255, 255, 0.4) 2px, transparent 2px) 0 0 / 220px 220px,
    radial-gradient(circle at 15% 45%, rgba(255, 255, 255, 0.35) 2px, transparent 2px) 0 0 / 260px 260px,
    radial-gradient(circle at 75% 60%, rgba(255, 255, 255, 0.4) 2.5px, transparent 2.5px) 0 0 / 300px 300px,
    linear-gradient(to bottom, #020813 0%, #051429 40%, #0b2b4e 75%, #103b66 100%);
    
  color:white;
  overflow: hidden;
  position: relative;
}

/* 떨어지는 별똥별 효과 */
.shooting-stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}
.star {
  position: absolute;
  top: -50px;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
  animation: animateStar 4s linear infinite;
  opacity: 0;
}
.star::before {
  content: '';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 150px;
  height: 1px;
  background: linear-gradient(90deg, #fff, transparent);
}
.star:nth-child(1) { left: 20%; animation-delay: 0s; animation-duration: 3s; }
.star:nth-child(2) { left: 50%; animation-delay: 1.5s; animation-duration: 4.5s; }
.star:nth-child(3) { left: 80%; animation-delay: 3s; animation-duration: 3.5s; }

@keyframes animateStar {
  0% { transform: rotate(-45deg) translateX(0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: rotate(-45deg) translateX(-1000px); opacity: 0; }
}

/* 🔥 배경음악 뮤트/재생 버튼 스타일 */
.music-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  padding: 10px 14px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255,255,255,0.1);
  transition: all 0.3s;
}
.music-btn:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: scale(1.05);
}

.card{
  width:360px;
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 30px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.title{
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
  text-shadow: 0 0 15px rgba(0, 188, 212, 0.8), 0 0 4px rgba(255, 255, 255, 0.6);
}

input, textarea{
  width: 100%;
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  box-sizing: border-box;
  font-size: 15px;
  background: rgba(255, 255, 255, 0.12);
  color: white;
  outline: none;
  transition: all 0.3s;
}

input:focus, textarea:focus {
  background: rgba(255, 255, 255, 0.2);
  border-color: #00bcd4;
}

input::placeholder, textarea::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

textarea{
  height: 200px;
  resize: none;
  line-height: 1.5;
}

button{
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #00bcd4, #0097a7);
  color: white;
  cursor: pointer;
  font-size: 15px;
  font-weight: bold;
  box-shadow: 0 2px 8px rgba(0, 188, 212, 0.4);
  transition: all 0.3s;
  margin-top: 5px;
}

button:hover{
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0, 188, 212, 0.6);
}
</style>
</head>

<body>

<audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<div class="shooting-stars">
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="card">

  <div class="title">
    🌟 글 쓰는 공간 🌟
  </div>

  <input
    id="title"
    placeholder="제목"
  >

  <textarea
    id="content"
    placeholder="내용"
  ></textarea>

  <button id="saveBtn">
    저장하기!
  </button>

</div>

<script>
/* 🔥 배경음악 재생/토글 스크립트 */
const bgm = document.getElementById("bgm");
const musicBtn = document.getElementById("musicBtn");

function toggleMusic() {
  if (bgm.paused) {
    bgm.play();
    musicBtn.innerText = "🎵";
    musicBtn.style.boxShadow = "0 0 15px rgba(0, 188, 212, 0.8)";
  } else {
    bgm.pause();
    musicBtn.innerText = "🔇";
    musicBtn.style.boxShadow = "none";
  }
}

window.addEventListener("click", () => {
  if (bgm.paused && musicBtn.innerText !== "🔇") {
    bgm.play().catch(() => {});
    musicBtn.style.boxShadow = "0 0 15px rgba(0, 188, 212, 0.8)";
  }
}, { once: true });
</script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Firebase 연결 완료");

let editId = localStorage.getItem("editId");

/* 🔥 수정 글 불러오기 */
window.addEventListener("load", async ()=>{
  if(editId){
    try{
      const ref = doc(db,"posts",editId);
      const snap = await getDoc(ref);

      if(snap.exists()){
        const data = snap.data();
        document.getElementById("title").value = data.title || "";
        document.getElementById("content").value = data.content || "";
      }
    }catch(e){
      console.log("불러오기 실패:", e);
    }
  }
});

/* 🔥 저장 */
document.getElementById("saveBtn").addEventListener("click", async ()=>{
  try{
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const user = sessionStorage.getItem("user");

    if(!user){
      alert("로그인 필요");
      return;
    }

    if(!title || !content){
      alert("제목과 내용을 입력하세요");
      return;
    }

    const now = new Date();
    const dateStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
                    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    /* 🔥 수정 */
    if(editId){
      const ref = doc(db,"posts",editId);
      const snap = await getDoc(ref);

      if(snap.exists()){
        await updateDoc(ref,{
          title,
          content
        });
      } else {
        await addDoc(
          collection(db,"posts"),
          {
            writer:user,
            title,
            content,
            date:dateStr,
            time:Date.now(),
            pinned:false
          }
        );
      }
      localStorage.removeItem("editId");
    }
    /* 🔥 새 글 */
    else {
      await addDoc(
        collection(db,"posts"),
        {
          writer:user,
          title,
          content,
          date:dateStr,
          time:Date.now(),
          pinned:false
        }
      );
    }

    /* 🔥 [이스터에그 작동부] 내용에 '사랑해'가 포함되었을 때 */
    if(content.includes("사랑해")) {
      alert("내가 더 사랑해 💖");
    } else {
      alert("저장 완료!");
    }
    
    location.href = "home.html";

  }catch(err){
    console.error("🔥 저장 실패:", err);
    alert("저장 실패");
  }
});

</script>

</body>
</html>
