<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 쓰기</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

/* 🔥 카드 */
.card{
  width:380px;
  background: rgba(255,255,255,0.12);
  padding:25px;
  border-radius:15px;

  display:flex;
  flex-direction:column;
  gap:12px;
}

/* 🔥 공통 크기 통일 */
input, textarea, button{
  width:100%;
  box-sizing:border-box;
  border-radius:10px;
  border:none;
  font-size:14px;
}

/* 제목 */
input{
  padding:12px;
}

/* 본문 */
textarea{
  padding:12px;
  height:160px;
  resize:none;
}

/* 저장 버튼 */
button{
  padding:12px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#009bb0;
}
</style>
</head>

<body>

<div class="card">
  <h2 style="text-align:center;margin:0;">글 쓰기</h2>

  <input id="title" placeholder="제목">
  <textarea id="content" placeholder="내용"></textarea>

  <button id="saveBtn">저장</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = localStorage.getItem("editId");

/* 수정 데이터 로딩 */
window.addEventListener("load", async () => {

  if(editId){
    const ref = doc(db,"posts",editId);
    const snap = await getDoc(ref);

    if(snap.exists()){
      const data = snap.data();
      document.getElementById("title").value = data.title || "";
      document.getElementById("content").value = data.content || "";
    }
  }

  document.getElementById("saveBtn").addEventListener("click", savePost);
});

/* 저장 */
async function savePost(){

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const user = sessionStorage.getItem("user");

  if(!title || !content){
    alert("내용 입력해");
    return;
  }

  const now = new Date();

  const dateStr =
    `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  if(editId){
    await updateDoc(doc(db,"posts",editId),{ title, content });
    localStorage.removeItem("editId");
  } else {
    await addDoc(collection(db,"posts"),{
      writer:user,
      title,
      content,
      date:dateStr,
      time:now.getTime(),
      pinned:false
    });
  }

  location.href="home.html";
}

</script>

</body>
</html>
