<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 쓰기</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.card{
  width:380px;
  background: rgba(255,255,255,0.12);
  padding:25px;
  border-radius:15px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#009bb0;
}
</style>
</head>

<body>

<div class="card">
  <h2 style="text-align:center;">글 쓰기</h2>

  <input id="title" placeholder="제목">
  <textarea id="content" rows="8" placeholder="내용"></textarea>

  <button id="saveBtn">저장</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = localStorage.getItem("editId");

/* 🔥 수정 글 불러오기 (무조건 안정 방식) */
window.addEventListener("load", async () => {

  if(editId){
    const ref = doc(db, "posts", editId);
    const snap = await getDoc(ref);

    if(snap.exists()){
      const data = snap.data();
      document.getElementById("title").value = data.title || "";
      document.getElementById("content").value = data.content || "";
    }
  }
});

/* 🔥 저장 */
async function savePost(){

  const user = sessionStorage.getItem("user");
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if(!title || !content){
    alert("제목/내용 입력");
    return;
  }

  const now = new Date();

  const dateStr =
    `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  if(editId){

    await updateDoc(doc(db,"posts",editId),{
      title,
      content
    });

    localStorage.removeItem("editId");

  } else {

    await addDoc(collection(db,"posts"),{
      writer:user,
      title,
      content,
      date:dateStr,
      time:now.getTime(),
      pinned:false
    });
  }

  location.href="home.html";
}

/* 🔥 버튼 연결 (이게 핵심) */
document.getElementById("saveBtn").addEventListener("click", savePost);

</script>

</body>
</html>
