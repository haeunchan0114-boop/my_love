<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 쓰기</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial, sans-serif;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

/* 🔥 로그인보다 살짝 크게 */
.card{
  background: rgba(255,255,255,0.12);
  padding:35px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:12px;

  width:300px;   /* 🔥 조금 크게 */
  box-sizing:border-box;
}

input, textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
  font-family:inherit;
}

textarea{
  height:180px;
  resize:none;
}

/* 🔥 버튼 확실하게 클릭되게 */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="title">글 쓰기</div>

<div class="card">
  <input id="title" placeholder="제목">
  <textarea id="content" placeholder="내용"></textarea>
  <button id="saveBtn">저장</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = localStorage.getItem("editId");

/* 🔥 수정 데이터 불러오기 */
window.addEventListener("load", async () => {
  try{
    if(editId){
      const snap = await getDoc(doc(db,"글",editId));
      if(snap.exists()){
        const d = snap.data();
        document.getElementById("title").value = d.title || "";
        document.getElementById("content").value = d.content || "";
      }
    }
  } catch(e){
    console.log(e);
  }
});

/* 🔥 저장 버튼 (무조건 안전하게 동작) */
document.getElementById("saveBtn").addEventListener("click", async () => {

  try{

    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const user = sessionStorage.getItem("user");

    if(!title || !content){
      alert("제목과 내용을 입력해주세요");
      return;
    }

    if(!user){
      alert("로그인 정보 없음");
      return;
    }

    const now = new Date();

    const dateStr =
      `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    if(editId){

      await updateDoc(doc(db,"글",editId),{
        title,
        content
      });

      localStorage.removeItem("editId");

    } else {

      await addDoc(collection(db,"글"),{
        writer:user,
        title,
        content,
        date:dateStr,
        time:Date.now(),
        pinned:false
      });
    }

    location.href="home.html";

  } catch(err){
    console.error("저장 오류:", err);
    alert("저장 실패 (콘솔 확인)");
  }

});

</script>

</body>
</html>
