<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 쓰는 곳!</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.card{
  width:320px;
  background: rgba(255,255,255,0.12);
  padding:25px;
  border-radius:15px;
}

input, textarea, button{
  width:100%;
  border:none;
  border-radius:10px;
}

input{ padding:10px; }
textarea{ padding:10px; height:140px; resize:none; }

button{
  padding:10px;
  background:#00bcd4;
  color:white;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>글 쓰기</h2>

  <input id="title" placeholder="제목">
  <textarea id="content" placeholder="내용"></textarea>

  <button onclick="savePost()">저장</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = localStorage.getItem("editId");

/* 수정 불러오기 */
window.addEventListener("load", async () => {
  if(editId){
    const snap = await getDoc(doc(db,"글",editId));
    if(snap.exists()){
      const d = snap.data();
      document.getElementById("title").value = d.title;
      document.getElementById("content").value = d.content;
    }
  }
});

/* 저장 */
window.savePost = async function(){

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const user = sessionStorage.getItem("user");

  const now = new Date();
  const date =
    `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  if(editId){

    await updateDoc(doc(db,"글",editId),{
      title,
      content
    });

    localStorage.removeItem("editId");

  } else {

    await addDoc(collection(db,"글"),{
      writer:user,
      title,
      content,
      date,
      time:Date.now(),
      pinned:false
    });
  }

  location.href="home.html";
};
</script>

</body>
</html>
