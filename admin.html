<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 작성</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.card{
  width:400px;
  background: rgba(255,255,255,0.12);
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,200,255,0.2);
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

textarea{
  resize:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
button:hover{
  background:#009bb0;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="card">
  <h2>글 작성</h2>

  <input id="title" placeholder="제목">
  <textarea id="content" rows="8" placeholder="내용"></textarea>

  <button onclick="save()">저장</button>
</div>

<script>
let editIndex = localStorage.getItem("editIndex");

// 수정 모드
if(editIndex !== null){
  document.getElementById("title").value = localStorage.getItem("editTitle");
  document.getElementById("content").value = localStorage.getItem("editContent");
}

function save(){

  let posts = JSON.parse(localStorage.getItem("posts") || "[]");
  let user = sessionStorage.getItem("user");

  let now = new Date();

  let dateStr =
    `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  let post = {
    writer: user,
    title: document.getElementById("title").value,
    content: document.getElementById("content").value,
    date: dateStr,
    time: now.getTime(),
    pinned: false
  };

  if(editIndex !== null){
    posts[editIndex] = post;
    localStorage.removeItem("editIndex");
    localStorage.removeItem("editTitle");
    localStorage.removeItem("editContent");
  } else {
    posts.push(post);
  }

  localStorage.setItem("posts", JSON.stringify(posts));
  location.href="home.html";
}
</script>

</body>
</html>
