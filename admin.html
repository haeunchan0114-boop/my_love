<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 작성</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.card{
  width:400px;
  margin:80px auto;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="card">
  <h2>글 작성</h2>

  <input id="writer" placeholder="이름">
  <input id="title" placeholder="제목">
  <textarea id="content" rows="8"></textarea>

  <button onclick="save()">저장</button>
</div>

<script>
let editIndex = localStorage.getItem("editIndex");

if(editIndex !== null){
  document.getElementById("title").value = localStorage.getItem("editTitle");
  document.getElementById("content").value = localStorage.getItem("editContent");
}

function save(){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  let writer = document.getElementById("writer").value;
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  let d = new Date();
  let dateStr = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;

  if(editIndex !== null){
    posts[editIndex] = { writer, title, content, date: dateStr };
    localStorage.removeItem("editIndex");
  } else {
    posts.push({ writer, title, content, date: dateStr });
  }

  localStorage.setItem("posts", JSON.stringify(posts));
  location.href="home.html";
}
</script>

</body>
</html>
