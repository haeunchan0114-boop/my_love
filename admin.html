<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 쓰는 곳!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.card{
  width:400px;
  background: rgba(255,255,255,0.12);
  padding:25px;
  border-radius:15px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:white;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="card">
  <h2>글 쓰기</h2>

  <input id="title" placeholder="제목">
  <textarea id="content" rows="8" placeholder="내용"></textarea>

  <button onclick="save()">저장</button>
</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "너 API키",
  authDomain: "너 authDomain",
  projectId: "너 projectId",
  storageBucket: "너 storageBucket",
  messagingSenderId: "너 senderId",
  appId: "너 appId"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ 글 저장 함수
async function savePost(){

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const user = sessionStorage.getItem("user");

  if(!title || !content){
    alert("내용 입력!");
    return;
  }

  const now = new Date();

  const dateStr =
    `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  await addDoc(collection(db, "posts"), {
    writer: user,
    title,
    content,
    date: dateStr,
    time: now.getTime(),
    pinned: false
  });

  location.href = "home.html";
}

// ⭐ 핵심: 버튼 연결 (이거 없으면 클릭 안 됨)
window.save = savePost;

</script>

</body>
</html>
