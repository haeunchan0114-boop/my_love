<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 쓰기</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.card{
  width:320px;
  background: rgba(255,255,255,0.12);
  padding:25px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input,textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

textarea{
  height:150px;
  resize:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <input id="title" placeholder="제목">
  <textarea id="content" placeholder="내용"></textarea>
  <button id="saveBtn">저장</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Firebase 연결 완료:", db);

let editId = localStorage.getItem("editId");

/* 🔥 수정 데이터 불러오기 */
window.addEventListener("load", async ()=>{

  if(editId){
    try{
      const snap = await getDoc(doc(db,"posts",editId));

      if(snap.exists()){
        const data = snap.data();
        document.getElementById("title").value = data.title || "";
        document.getElementById("content").value = data.content || "";
      }

    }catch(e){
      console.log("불러오기 실패:", e);
    }
  }
});

/* 🔥 저장 */
document.getElementById("saveBtn").addEventListener("click", async ()=>{

  try{

    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const user = sessionStorage.getItem("user");

    console.log("저장 데이터:", {title, content, user});

    if(!user){
      alert("로그인 필요");
      return;
    }

    if(!title || !content){
      alert("제목/내용 입력");
      return;
    }

    const now = new Date();

    const dateStr =
      `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    // 🔥 수정
    if(editId){

      await updateDoc(doc(db,"posts",editId),{
        title,
        content
      });

      localStorage.removeItem("editId");

    } 
    // 🔥 새 글
    else {

      await addDoc(collection(db,"posts"),{
        writer:user,
        title,
        content,
        date:dateStr,
        time:Date.now(),
        pinned:false
      });
    }

    alert("저장 완료!");
    location.href="home.html";

  }catch(err){
    console.error("🔥 저장 실패 원인:", err);
    alert("저장 실패 (F12 콘솔 확인)");
  }

});

</script>

</body>
</html>
