<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = localStorage.getItem("editId");

/* 🔥 수정 글 정확히 불러오기 */
if(editId){

  const title = localStorage.getItem("editTitle");
  const content = localStorage.getItem("editContent");

  document.getElementById("title").value = title || "";
  document.getElementById("content").value = content || "";
}

/* 🔥 저장 */
async function savePost(){

  const user = sessionStorage.getItem("user");
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  const now = new Date();

  const dateStr =
    `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ` +
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  if(editId){

    const ref = doc(db, "posts", editId);

    const snap = await getDoc(ref);

    if(!snap.exists()){
      alert("글 없음");
      return;
    }

    if(snap.data().writer !== user){
      alert("본인만 수정 가능");
      return;
    }

    await updateDoc(ref, {
      title,
      content
    });

    localStorage.removeItem("editId");

  } else {

    await addDoc(collection(db, "posts"), {
      writer: user,
      title,
      content,
      date: dateStr,
      time: now.getTime(),
      pinned: false
    });
  }

  location.href = "home.html";
}

window.save = savePost;

</script>
