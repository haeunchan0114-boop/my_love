<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.header h1{
  margin:0;
  font-size:34px;
}

.sub{
  margin-top:8px;
  font-size:15px;
  opacity:0.8;
}

.card{
  width:80%;
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:20px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

button{
  padding:7px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.post p{
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="header">

  <h1>🌟 나의 사랑하는 별에게 🌟</h1>

  <div class="sub">
    우리의 빛나는 글들
  </div>

</div>

<div class="card">

  <div class="controls">

    <input
      id="searchTitle"
      placeholder="글 검색"
    >

    <input
      id="searchWriter"
      placeholder="글 쓴이 검색"
    >

    <select id="sort">

      <option value="new">
        최신순
      </option>

      <option value="old">
        오래된순
      </option>

    </select>

    <button onclick="
      localStorage.removeItem('editId');
      location.href='admin.html';
    ">
      글 쓰기
    </button>

  </div>

  <div
    id="posts"
    style="
      display:flex;
      flex-direction:column;
      gap:10px;
    "
  ></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

  apiKey:
  "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",

  authDomain:
  "loveletter-for-you.firebaseapp.com",

  projectId:
  "loveletter-for-you",

  storageBucket:
  "loveletter-for-you.firebasestorage.app",

  messagingSenderId:
  "40216107468",

  appId:
  "1:40216107468:web:b635ba7797490396952569"

};

const app =
  initializeApp(firebaseConfig);

const db =
  getFirestore(app);

let posts = [];

/* 🔥 실시간 글 불러오기 */
onSnapshot(
  collection(db,"posts"),
  snap=>{

    posts = [];

    snap.forEach(d=>{

      posts.push({

        id:d.id,
        ...d.data()

      });

    });

    render();

  }
);

/* 🔥 화면 출력 */
function render(){

  const box =
    document.getElementById("posts");

  // 완전 초기화
  box.innerHTML = "";

  let list = [...posts];

  const titleKeyword =
    document
    .getElementById("searchTitle")
    .value
    .trim();

  const writerKeyword =
    document
    .getElementById("searchWriter")
    .value
    .trim();

  const sort =
    document
    .getElementById("sort")
    .value;

  const user =
    sessionStorage.getItem("user");

  // 제목 검색
  if(titleKeyword){

    list = list.filter(p=>

      p.title &&
      p.title.includes(titleKeyword)

    );
  }

  // 작성자 검색
  if(writerKeyword){

    list = list.filter(p=>

      p.writer &&
      p.writer.includes(writerKeyword)

    );
  }

  // 정렬
  list.sort((a,b)=>{

    // 고정글 우선
    if(a.pinned && !b.pinned)
      return -1;

    if(!a.pinned && b.pinned)
      return 1;

    // 최신/오래된순
    return sort==="new"
      ? b.time - a.time
      : a.time - b.time;

  });

  // 글 없으면 종료
  if(list.length === 0){
    return;
  }

  // 게시글 출력
  list.forEach(p=>{

    const div =
      document.createElement("div");

    div.className = "post";

    div.innerHTML = `

      <h3>
        ${p.pinned ? "📌 " : ""}
        ${p.title || ""}
      </h3>

      <small>
        ${p.writer || ""}
        ·
        ${p.date || ""}
      </small>

      ${
        p.content
        ? `<p>${p.content}</p>`
        : ""
      }

      ${
        p.writer === user
        ? `

          <button
            onclick="edit('${p.id}')"
          >
            수정
          </button>

          <button
            onclick="
              del(
                '${p.id}',
                '${p.writer}'
              )
            "
          >
            삭제
          </button>

          <button
            onclick="
              pin(
                '${p.id}',
                ${p.pinned}
              )
            "
          >
            ${
              p.pinned
              ? "고정해제"
              : "고정"
            }
          </button>

        `
        : ""
      }

    `;

    box.appendChild(div);

  });

}

/* 🔥 삭제 */
window.del = async (id,writer)=>{

  if(
    sessionStorage.getItem("user")
    !== writer
  ){
    alert("본인만 가능");
    return;
  }

  await deleteDoc(
    doc(db,"posts",id)
  );

};

/* 🔥 고정 */
window.pin = async (id,pinned)=>{

  await updateDoc(
    doc(db,"posts",id),
    {
      pinned: !pinned
    }
  );

};

/* 🔥 수정 */
window.edit = (id)=>{

  localStorage.setItem(
    "editId",
    id
  );

  location.href =
    "admin.html";
};

/* 🔥 검색/정렬 실시간 */
document
.getElementById("searchTitle")
.oninput = render;

document
.getElementById("searchWriter")
.oninput = render;

document
.getElementById("sort")
.onchange = render;

</script>

</body>
</html>
