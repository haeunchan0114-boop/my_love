<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>게시판</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.card{
  width:80%;
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:15px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

.post p{
  white-space:pre-wrap;
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}

#pagination button{
  margin:3px;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">나의 사랑하는 별에게</div>

<div class="card">

  <div class="controls">
    <input id="search" placeholder="제목 / 작성자 검색">

    <select id="sort">
      <option value="new" selected>최신순</option>
      <option value="old">오래된순</option>
    </select>

    <button onclick="location.href='admin.html'">글 작성</button>
  </div>

  <div id="posts"></div>
</div>

<script>
let currentPage = 1;
const perPage = 3;

function getPosts(){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  // 🔥 핵심: 예전 글 자동 시간 보정
  posts = posts.map(p => {

    if(!p.time){
      let parsed = new Date(p.date);

      if(isNaN(parsed.getTime())){
        parsed = new Date();
      }

      p.time = parsed.getTime();

      const d = parsed;
      p.date =
        `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} ` +
        `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    return p;
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  return posts;
}

function render(reset = true){

  let posts = getPosts();
  let user = sessionStorage.getItem("user");

  const keyword = document.getElementById("search").value;
  let sort = document.getElementById("sort").value;

  if(reset){
    currentPage = 1;
  }

  if(keyword){
    posts = posts.filter(p =>
      p.title.includes(keyword) ||
      p.writer.includes(keyword)
    );
  }

  // 🔥 최신 / 오래된 정렬
  posts.sort((a,b)=>{
    return sort === "new"
      ? b.time - a.time
      : a.time - b.time;
  });

  const box = document.getElementById("posts");
  box.innerHTML = "";

  let start = (currentPage - 1) * perPage;
  let pagePosts = posts.slice(start, start + perPage);

  pagePosts.forEach(p=>{

    let isOwner = (p.writer === user);

    let realIndex = getPosts().findIndex(x =>
      x.title === p.title &&
      x.time === p.time
    );

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>

      ${isOwner ? `
        <button onclick="edit(${realIndex})">수정</button>
        <button onclick="del(${realIndex})">삭제</button>
      ` : ""}
    `;

    box.appendChild(div);
  });

  renderPage(posts.length);
}

// 페이지
function renderPage(total){
  let pageCount = Math.ceil(total / perPage);

  let old = document.getElementById("pagination");
  if(old) old.remove();

  const div = document.createElement("div");
  div.id = "pagination";
  div.style.textAlign = "center";

  for(let i=1;i<=pageCount;i++){
    const btn = document.createElement("button");
    btn.innerText = i;

    btn.onclick = ()=>{
      currentPage = i;
      render(false);
    };

    div.appendChild(btn);
  }

  document.body.appendChild(div);
}

// 삭제
function del(i){
  let posts = getPosts();
  let user = sessionStorage.getItem("user");

  if(posts[i].writer !== user){
    alert("본인 글만 삭제 가능");
    return;
  }

  posts.splice(i,1);
  localStorage.setItem("posts", JSON.stringify(posts));
  render(false);
}

// 수정
function edit(i){
  let posts = getPosts();
  let user = sessionStorage.getItem("user");

  if(posts[i].writer !== user){
    alert("본인 글만 수정 가능");
    return;
  }

  localStorage.setItem("editIndex", i);
  localStorage.setItem("editTitle", posts[i].title);
  localStorage.setItem("editContent", posts[i].content);

  location.href="admin.html";
}

document.getElementById("search").oninput = () => render(true);
document.getElementById("sort").onchange = () => render(true);

document.getElementById("sort").value = "new";

render(true);
</script>

</body>
</html>
