/* 떨어지는 별똥별 효과 */
.shooting-stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}
.star {
  position: absolute;
  top: -50px;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
  animation: animateStar 4s linear infinite;
  opacity: 0;
}
.star::before {
  content: '';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 150px;
  height: 1px;
  background: linear-gradient(90deg, #fff, transparent);
}
.star:nth-child(1) { left: 30%; animation-delay: 0s; animation-duration: 3s; }
.star:nth-child(2) { left: 60%; animation-delay: 1.5s; animation-duration: 4.5s; }
.star:nth-child(3) { left: 80%; animation-delay: 3s; animation-duration: 3.5s; }

@keyframes animateStar {
  0% { transform: rotate(-45deg) translateX(0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: rotate(-45deg) translateX(-1000px); opacity: 0; }
}
