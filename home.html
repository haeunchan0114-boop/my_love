<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳!</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.card{
  width:80%;
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:15px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

.post p{
  white-space:pre-wrap;
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<!-- 🔥 기존 헤더 유지 -->
<div class="header">
  <div style="font-size:34px;font-weight:bold;">
    🌟 나의 사랑하는 별에게 🌟
  </div>
  <div style="font-size:16px;opacity:0.8;">
    우리의 빛나는 글들
  </div>
</div>

<div class="card">

  <!-- 🔥 기존 컨트롤 유지 (삭제 안함) -->
  <div class="controls">
    <input id="search" placeholder="제목 / 작성자">

    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>

    <button onclick="location.href='admin.html'">글 쓰러가기!</button>
  </div>

  <div id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let posts = [];

onSnapshot(collection(db,"posts"), snap=>{
  posts = [];

  snap.forEach(d=>{
    posts.push({
      id: d.id,
      ...d.data()
    });
  });

  render();
});

function render(){

  const user = sessionStorage.getItem("user");
  const box = document.getElementById("posts");
  box.innerHTML = "";

  let keyword = document.getElementById("search").value;
  let sort = document.getElementById("sort").value;

  let filtered = [...posts];

  // 🔍 검색
  if(keyword){
    filtered = filtered.filter(p =>
      p.title.includes(keyword) ||
      p.writer.includes(keyword)
    );
  }

  // 📌 고정 먼저 + 나머지 정렬
  filtered.sort((a,b)=>{

    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;

    return sort === "new"
      ? b.time - a.time
      : a.time - b.time;
  });

  filtered.forEach(p=>{

    const div = document.createElement("div");
    div.className="post";

    div.innerHTML = `
      <h3>${p.pinned ? "📌 " : ""}${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>

      ${p.writer === user ? `
        <button onclick="editPost('${p.id}')">수정</button>
        <button onclick="deletePost('${p.id}','${p.writer}')">삭제</button>
        <button onclick="togglePin('${p.id}',${p.pinned})">
          ${p.pinned ? "고정 해제" : "고정"}
        </button>
      ` : ""}
    `;

    box.appendChild(div);
  });
}

/* 삭제 */
window.deletePost = async function(id,writer){
  if(sessionStorage.getItem("user") !== writer){
    alert("본인만 가능");
    return;
  }
  await deleteDoc(doc(db,"posts",id));
};

/* 고정 */
window.togglePin = async function(id,pinned){
  await updateDoc(doc(db,"posts",id),{
    pinned: !pinned
  });
};

/* 수정 */
window.editPost = function(id){
  localStorage.setItem("editId",id);
  location.href="admin.html";
};

document.getElementById("search").oninput = render;
document.getElementById("sort").onchange = render;

</script>

</body>
</html>
