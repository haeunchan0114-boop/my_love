<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>바다 글 목록</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

/* 상단 */
.header{
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

/* 카드 */
.card{
  width:80%;
  margin:20px auto;
}

/* 글 박스 */
.post{
  background: rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
  box-shadow: 0 0 15px rgba(0,200,255,0.2);
  transition:0.3s;
}

.post:hover{
  transform: translateY(-3px);
  box-shadow: 0 0 25px rgba(0,200,255,0.4);
}

/* 버튼 */
button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#00a3b8;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">나의 사랑하는 별에게</div>

<div class="card">
  <button onclick="location.href='admin.html'">글 작성</button>
  <div id="posts"></div>
</div>

<script>
function loadPosts(){
  const posts = JSON.parse(localStorage.getItem("posts") || "[]");
  const box = document.getElementById("posts");
  box.innerHTML = "";

  posts.forEach((p, index) => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.content}</p>

      <button onclick="editPost(${index})">수정</button>
      <button onclick="deletePost(${index})">삭제</button>
    `;

    box.appendChild(div);
  });
}

function deletePost(index){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");
  posts.splice(index, 1);
  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

function editPost(index){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  localStorage.setItem("editIndex", index);
  localStorage.setItem("editTitle", posts[index].title);
  localStorage.setItem("editContent", posts[index].content);

  location.href = "admin.html";
}

loadPosts();
</script>

</body>
</html>
