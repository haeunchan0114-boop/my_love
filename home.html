<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>게시판</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  background-attachment:fixed;
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.card{
  width:80%;
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:15px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

.post p{
  white-space:pre-wrap;
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}

#pagination button{
  margin:3px;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">나의 사랑하는 별에게</div>

<div class="card">

  <div class="controls">
    <input id="search" placeholder="제목 / 작성자 검색" oninput="render()">

    <select id="sort" onchange="render()">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>

    <button onclick="location.href='admin.html'">글 작성</button>
  </div>

  <div id="posts"></div>
</div>

<script>
let currentPage = 1;
const perPage = 5;

function getPosts(){
  return JSON.parse(localStorage.getItem("posts") || "[]");
}

function render(){

  let posts = getPosts();
  let user = sessionStorage.getItem("user") || "";

  const keyword = document.getElementById("search").value;
  const sort = document.getElementById("sort").value;

  currentPage = 1;

  // 🔍 검색
  if(keyword){
    posts = posts.filter(p =>
      p.title.includes(keyword) ||
      p.writer.includes(keyword)
    );
  }

  // 🔥 정렬 (완전 정상)
  posts.sort((a,b)=>{
    return sort === "new"
      ? new Date(b.date) - new Date(a.date)
      : new Date(a.date) - new Date(b.date);
  });

  const box = document.getElementById("posts");
  box.innerHTML = "";

  let start = (currentPage - 1) * perPage;
  let end = start + perPage;

  let pagePosts = posts.slice(start, end);

  pagePosts.forEach((p)=>{

    let isOwner = (p.writer === user);

    // 🔥 핵심: 안전한 index 찾기 (이게 안되면 버튼 다 망가짐)
    let realIndex = getPosts().findIndex(x =>
      x.title === p.title &&
      x.date === p.date &&
      x.writer === p.writer
    );

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>

      ${isOwner ? `
        <button onclick="edit(${realIndex})">수정</button>
        <button onclick="del(${realIndex})">삭제</button>
      ` : ""}
    `;

    box.appendChild(div);
  });

  renderPage(posts.length);
}

function renderPage(total){
  let pageCount = Math.ceil(total / perPage);

  let old = document.getElementById("pagination");
  if(old) old.remove();

  const div = document.createElement("div");
  div.id = "pagination";
  div.style.textAlign = "center";

  for(let i=1;i<=pageCount;i++){
    const btn = document.createElement("button");
    btn.innerText = i;

    btn.onclick = ()=>{
      currentPage = i;
      render();
    };

    div.appendChild(btn);
  }

  document.body.appendChild(div);
}

// 🔥 삭제
function del(i){
  let posts = getPosts();
  let user = sessionStorage.getItem("user");

  if(posts[i].writer !== user){
    alert("본인 글만 삭제 가능");
    return;
  }

  posts.splice(i,1);
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

// 🔥 수정
function edit(i){
  let posts = getPosts();
  let user = sessionStorage.getItem("user");

  if(posts[i].writer !== user){
    alert("본인 글만 수정 가능");
    return;
  }

  localStorage.setItem("editIndex", i);
  localStorage.setItem("editTitle", posts[i].title);
  localStorage.setItem("editContent", posts[i].content);

  location.href="admin.html";
}

render();
</script>

</body>
</html>
