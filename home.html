<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>나의 사랑하는 별에게</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
  min-height:100vh;
  background-attachment: fixed;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.card{
  width:80%;
  margin:20px auto;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
  box-shadow: 0 0 15px rgba(0,200,255,0.2);
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
button:hover{
  background:#009bb0;
}

#pagination button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#00bcd4;
  color:white;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">나의 사랑하는 별에게</div>

<div class="card">
  <button onclick="location.href='admin.html'">글 작성</button>
  <div id="posts"></div>
</div>

<script>
let currentPage = 1;
const postsPerPage = 5;

function fixOldPosts(){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  let changed = false;

  posts = posts.map(p=>{
    if(!p.date){
      let d = new Date();
      p.date = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
      changed = true;
    }
    return p;
  });

  if(changed){
    localStorage.setItem("posts", JSON.stringify(posts));
  }
}

function loadPosts(){
  fixOldPosts();

  let posts = JSON.parse(localStorage.getItem("posts") || "[]");
  let user = sessionStorage.getItem("user");

  const box = document.getElementById("posts");
  box.innerHTML = "";

  let start = (currentPage - 1) * postsPerPage;
  let end = start + postsPerPage;

  let pagePosts = posts.slice(start, end);

  pagePosts.forEach((p, i)=>{
    const realIndex = start + i;
    let isOwner = (p.writer === user);

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${p.title}</h3>

      <small style="opacity:0.7;">
        ${p.writer} · ${p.date}
      </small>

      <p>${p.content}</p>

      ${isOwner ? `
        <button onclick="edit(${realIndex})">수정</button>
        <button onclick="del(${realIndex})">삭제</button>
      ` : ""}
    `;

    box.appendChild(div);
  });

  renderPagination(posts.length);
}

function renderPagination(total){
  let pageCount = Math.ceil(total / postsPerPage);

  let old = document.getElementById("pagination");
  if(old) old.remove();

  const div = document.createElement("div");
  div.id = "pagination";
  div.style.textAlign = "center";
  div.style.margin = "20px";

  for(let i=1;i<=pageCount;i++){
    const btn = document.createElement("button");
    btn.innerText = i;

    btn.onclick = ()=>{
      currentPage = i;
      loadPosts();
    };

    div.appendChild(btn);
  }

  document.body.appendChild(div);
}

function del(i){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");
  let user = sessionStorage.getItem("user");

  if(posts[i].writer !== user){
    alert("본인 글만 삭제 가능");
    return;
  }

  posts.splice(i,1);
  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

function edit(i){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");
  let user = sessionStorage.getItem("user");

  if(posts[i].writer !== user){
    alert("본인 글만 수정 가능");
    return;
  }

  localStorage.setItem("editIndex", i);
  localStorage.setItem("editTitle", posts[i].title);
  localStorage.setItem("editContent", posts[i].content);

  location.href="admin.html";
}

loadPosts();
</script>

</body>
</html>
