<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.section{
  width:80%;
  margin:0 auto 20px auto;
}

.section-title{
  font-size:18px;
  font-weight:bold;
  margin:10px 0;
  opacity:0.9;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">
  <h1>🌟 나의 사랑하는 별에게 🌟</h1>
</div>

<!-- 📌 고정글 -->
<div class="section">
  <div class="section-title">📌 고정 글</div>
  <div id="pinned"></div>
</div>

<!-- 🆕 일반글 -->
<div class="section">
  <div class="section-title">🆕 최신 글</div>
  <div id="normal"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let posts = [];

onSnapshot(collection(db,"posts"), snap=>{
  posts = [];

  snap.forEach(d=>{
    posts.push({
      id: d.id,
      ...d.data()
    });
  });

  render();
});

function render(){

  const user = sessionStorage.getItem("user");

  const pinnedBox = document.getElementById("pinned");
  const normalBox = document.getElementById("normal");

  pinnedBox.innerHTML = "";
  normalBox.innerHTML = "";

  // 📌 고정 / 일반 분리
  const pinnedPosts = posts.filter(p => p.pinned);
  const normalPosts = posts.filter(p => !p.pinned);

  // 🆕 최신순 정렬 (일반글만)
  normalPosts.sort((a,b)=> b.time - a.time);

  // 📌 고정글 표시
  pinnedPosts.forEach(p=>{
    pinnedBox.appendChild(createPost(p, user));
  });

  // 🆕 일반글 표시
  normalPosts.forEach(p=>{
    normalBox.appendChild(createPost(p, user));
  });
}

/* 🔥 글 카드 생성 함수 */
function createPost(p, user){

  const div = document.createElement("div");
  div.className = "post";

  div.innerHTML = `
    <h3>📌 ${p.pinned ? p.title : p.title}</h3>
    <small>${p.writer} · ${p.date}</small>
    <p>${p.content}</p>

    ${p.writer === user ? `
      <button onclick="editPost('${p.id}')">수정</button>
      <button onclick="deletePost('${p.id}','${p.writer}')">삭제</button>
      <button onclick="togglePin('${p.id}',${p.pinned})">
        ${p.pinned ? "고정 해제" : "고정"}
      </button>
    ` : ""}
  `;

  return div;
}

/* 삭제 */
window.deletePost = async function(id,writer){
  if(sessionStorage.getItem("user") !== writer){
    alert("본인만 가능");
    return;
  }
  await deleteDoc(doc(db,"posts",id));
};

/* 고정 */
window.togglePin = async function(id,pinned){
  await updateDoc(doc(db,"posts",id),{
    pinned: !pinned
  });
};

/* 수정 */
window.editPost = function(id){
  localStorage.setItem("editId",id);
  location.href="admin.html";
};

</script>

</body>
</html>
