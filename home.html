<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.card{
  width:80%;
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:15px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
}

#pagination button{
  margin:3px;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">
  <h1>🌟 나의 사랑하는 별에게 🌟</h1>
  <div style="opacity:0.8;">우리의 빛나는 글들</div>
</div>

<div class="card">

  <div class="controls">
    <input id="search" placeholder="제목 / 작성자">
    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>
    <button onclick="location.href='admin.html'">글 쓰러가기!</button>
  </div>

  <div id="posts"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];

/* 🔥 실시간 데이터 */
onSnapshot(collection(db, "posts"), (snap) => {
  allPosts = [];

  snap.forEach(docu => {
    let d = docu.data();
    d.id = docu.id; // ⭐ 중요 (CRUD 핵심)

    d.title = d.title || "";
    d.content = d.content || "";
    d.writer = d.writer || "";
    d.date = d.date || "";
    d.time = d.time || new Date().getTime();
    d.pinned = d.pinned || false;

    allPosts.push(d);
  });

  render();
});

let currentPage = 1;
const perPage = 3;

/* 🔥 렌더 */
function render(reset=true){

  let posts = [...allPosts];

  const keyword = document.getElementById("search").value;
  const sort = document.getElementById("sort").value;

  if(reset) currentPage = 1;

  if(keyword){
    posts = posts.filter(p =>
      p.title.includes(keyword) ||
      p.writer.includes(keyword)
    );
  }

  posts.sort((a,b)=>{
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;

    return sort === "new"
      ? b.time - a.time
      : a.time - b.time;
  });

  const box = document.getElementById("posts");
  box.innerHTML = "";

  const start = (currentPage-1)*perPage;
  const page = posts.slice(start, start+perPage);

  page.forEach(p=>{
    const div = document.createElement("div");
    div.className="post";

    div.innerHTML = `
      <h3>${p.pinned ? "📌 " : ""}${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>

      <button onclick="editPost('${p.id}')">수정</button>
      <button onclick="deletePost('${p.id}')">삭제</button>
      <button onclick="togglePin('${p.id}', ${p.pinned})">
        ${p.pinned ? "고정 해제" : "고정"}
      </button>
    `;

    box.appendChild(div);
  });

  renderPage(posts.length);
}

/* 🔥 페이지 */
function renderPage(total){

  let pages = Math.ceil(total/perPage);

  let old = document.getElementById("pagination");
  if(old) old.remove();

  const div = document.createElement("div");
  div.id="pagination";
  div.style.textAlign="center";

  for(let i=1;i<=pages;i++){
    let btn=document.createElement("button");
    btn.innerText=i;
    btn.onclick=()=>{currentPage=i;render(false);};
    div.appendChild(btn);
  }

  document.body.appendChild(div);
}

/* 🔥 삭제 */
window.deletePost = async function(id){
  await deleteDoc(doc(db, "posts", id));
};

/* 🔥 고정 */
window.togglePin = async function(id, pinned){
  await updateDoc(doc(db, "posts", id), {
    pinned: !pinned
  });
};

/* 🔥 수정 */
window.editPost = function(id){
  const post = allPosts.find(p => p.id === id);

  localStorage.setItem("editId", id);
  localStorage.setItem("editTitle", post.title);
  localStorage.setItem("editContent", post.content);

  location.href = "admin.html";
};

/* 이벤트 */
document.getElementById("search").oninput=()=>render(true);
document.getElementById("sort").onchange=()=>render(true);

</script>

</body>
</html>
