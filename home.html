<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보기</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.card{
  width:80%;
  margin:20px auto;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">
  <h1>🌟 나의 사랑하는 별에게 🌟</h1>
</div>

<div class="card">
  <div id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let posts = [];

onSnapshot(collection(db,"posts"), snap=>{
  posts = [];

  snap.forEach(d=>{
    let data = d.data();
    data.id = d.id;
    posts.push(data);
  });

  render();
});

function render(){

  const user = sessionStorage.getItem("user");
  const box = document.getElementById("posts");
  box.innerHTML = "";

  posts.forEach(p=>{

    const isOwner = p.writer === user;

    const div = document.createElement("div");
    div.className="post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>

      ${isOwner ? `
        <button onclick="editPost('${p.id}')">수정</button>
        <button onclick="deletePost('${p.id}','${p.writer}')">삭제</button>
        <button onclick="togglePin('${p.id}','${p.writer}',${p.pinned})">
          ${p.pinned ? "고정 해제" : "고정"}
        </button>
      ` : ""}
    `;

    box.appendChild(div);
  });
}

/* 삭제 */
window.deletePost = async function(id,writer){
  if(sessionStorage.getItem("user") !== writer){
    alert("본인만 가능");
    return;
  }
  await deleteDoc(doc(db,"posts",id));
};

/* 고정 */
window.togglePin = async function(id,writer,pinned){
  if(sessionStorage.getItem("user") !== writer){
    alert("본인만 가능");
    return;
  }
  await updateDoc(doc(db,"posts",id),{
    pinned: !pinned
  });
};

/* 수정 */
window.editPost = function(id){
  localStorage.setItem("editId",id);
  location.href="admin.html";
};

</script>

</body>
</html>
