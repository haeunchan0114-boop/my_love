<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 공간!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  
  /* 🔥 별이 쏟아지는 깊은 밤바다 컨셉 */
  background: 
    /* 은하수처럼 작은 별들 */
    radial-gradient(circle at 10% 15%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 80px 80px,
    radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 100px 100px,
    radial-gradient(circle at 70% 25%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 90px 90px,
    radial-gradient(circle at 90% 75%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 110px 110px,
    
    /* 중간 크기 별들 */
    radial-gradient(circle at 25% 65%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 150px 150px,
    radial-gradient(circle at 55% 80%, rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px) 0 0 / 130px 130px,
    radial-gradient(circle at 85% 45%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 160px 160px,
    
    /* 유독 빛나는 큰 별들 */
    radial-gradient(circle at 50% 15%, rgba(255, 255, 255, 0.4) 2px, transparent 2px) 0 0 / 220px 220px,
    radial-gradient(circle at 15% 45%, rgba(255, 255, 255, 0.35) 2px, transparent 2px) 0 0 / 260px 260px,
    radial-gradient(circle at 75% 60%, rgba(255, 255, 255, 0.4) 2.5px, transparent 2.5px) 0 0 / 300px 300px,
    
    /* 깊은 심해에서 해변으로 이어지는 밤바다 그라데이션 */
    linear-gradient(to bottom, #020813 0%, #051429 35%, #0b2b4e 65%, #144775 85%, #1c6294 100%);
    
  color:white;
  background-attachment: fixed; /* 스크롤해도 배경은 고정되어 별바다가 유지됨 */
}

.header{
  text-align:center;
  padding:30px 20px;
}

.header h1{
  margin:0;
  font-size:36px;
  font-weight: bold;
  /* 글자가 바다 위에 뜬 별처럼 빛나는 효과 */
  text-shadow: 0 0 15px rgba(0, 188, 212, 0.8), 0 0 4px rgba(255, 255, 255, 0.6);
}

.sub{
  margin-top:10px;
  font-size:16px;
  opacity:0.85;
  letter-spacing: 2px;
}

.card{
  width:85%;
  max-width: 800px; /* 너무 퍼지지 않게 밸런스 조절 */
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:25px;
}

input, select{
  padding:10px 12px;
  margin:5px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius:8px;
  background: rgba(255, 255, 255, 0.12);
  color: white;
  outline: none;
  transition: all 0.3s;
}

input:focus, select:focus {
  background: rgba(255, 255, 255, 0.2);
  border-color: #00bcd4;
}

input::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

select option {
  background: #051429;
  color: white;
}

button{
  padding:9px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background: linear-gradient(135deg, #00bcd4, #0097a7);
  color:white;
  font-weight: bold;
  cursor:pointer;
  box-shadow: 0 2px 8px rgba(0, 188, 212, 0.4);
  transition: all 0.3s;
}

button:hover{
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0, 188, 212, 0.6);
}

.post{
  /* 바다 위에 투명한 유리판이 떠 있는 듯한 글래모피즘 효과 */
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}

.post h3 {
  margin: 0 0 8px 0;
  font-size: 20px;
}

.post small {
  color: rgba(255, 255, 255, 0.6);
}

.post p{
  white-space:pre-wrap;
  margin-top:15px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.95);
}

/* 포스트 내부 버튼 스타일 미세 조정 */
.post button {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: none;
  font-weight: normal;
  font-size: 13px;
  padding: 5px 10px;
}
.post button:hover {
  background: rgba(255, 255, 255, 0.25);
  box-shadow: none;
}
</style>
</head>

<body>

<div class="header">
  <h1>🌟 나의 사랑하는 별에게 🌟</h1>
  <div class="sub">우리의 빛나는 글들</div>
</div>

<div class="card">
  <div class="controls">
    <input id="searchTitle" placeholder="글 제목">
    <input id="searchWriter" placeholder="글 쓴 사람">
    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>
    <button onclick="
      localStorage.removeItem('editId');
      location.href='admin.html';
    ">
      글 쓰러가기
    </button>
  </div>

  <div id="posts"></div>
</div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let posts = [];

/* 🔥 실시간 데이터 */
onSnapshot(
  collection(db,"posts"),
  (snap)=>{
    posts = [];
    snap.forEach((d)=>{
      const data = d.data();
      if(!data.title && !data.content){
        return;
      }
      posts.push({
        id:d.id,
        writer:data.writer || "",
        title:data.title || "",
        content:data.content || "",
        date:data.date || "",
        time:Number(data.time) || 0,
        pinned:data.pinned || false
      });
    });
    render();
  }
);

/* 🔥 렌더 */
function render(){
  const box = document.getElementById("posts");
  box.innerHTML = "";
  let list = [...posts];

  const titleKeyword = document.getElementById("searchTitle").value.trim().toLowerCase();
  const writerKeyword = document.getElementById("searchWriter").value.trim().toLowerCase();
  const sort = document.getElementById("sort").value;
  const user = sessionStorage.getItem("user");

  if(titleKeyword){
    list = list.filter(p=> p.title.toLowerCase().includes(titleKeyword) );
  }

  if(writerKeyword){
    list = list.filter(p=> p.writer.toLowerCase().includes(writerKeyword) );
  }

  list.sort((a,b)=>{
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    if(sort === "new"){ return b.time - a.time; }
    return a.time - b.time;
  });

  if(list.length === 0){ return; }

  /* 🔥 출력 */
  list.forEach((p)=>{
    const div = document.createElement("div");
    div.className = "post";
    let html = "";

    html += `<h3>${p.pinned ? "📌 " : ""}${p.title}</h3>`;
    html += `<small>${p.writer} · ${p.date}</small>`;

    if(p.content){
      html += `<p>${p.content}</p>`;
    }

    if(p.writer === user){
      html += `
        <button onclick="edit('${p.id}')">수정</button>
        <button onclick="del('${p.id}','${p.writer}')">삭제</button>
        <button onclick="pin('${p.id}', ${p.pinned})">${p.pinned ? "고정해제" : "고정"}</button>
      `;
    }
    div.innerHTML = html;
    box.appendChild(div);
  });
}

/* 🔥 삭제 */
window.del = async (id,writer)=>{
  if(sessionStorage.getItem("user") !== writer){
    alert("본인만 가능");
    return;
  }
  await deleteDoc(doc(db,"posts",id));
};

/* 🔥 고정 */
window.pin = async (id,pinned)=>{
  await updateDoc(doc(db,"posts",id), { pinned: !pinned });
};

/* 🔥 수정 */
window.edit = (id)=>{
  localStorage.setItem("editId", id);
  location.href = "admin.html";
};

/* 🔥 검색 & 정렬 이벤트 */
document.getElementById("searchTitle").addEventListener("input", render);
document.getElementById("searchWriter").addEventListener("input", render);
document.getElementById("sort").addEventListener("change", render);
</script>

</body>
</html>
