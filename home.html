<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 공간!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  
  /* 🔥 별이 쏟아지는 밤하늘 배경 */
  background: 
    radial-gradient(circle at 10% 15%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 80px 80px,
    radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 100px 100px,
    radial-gradient(circle at 70% 25%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 90px 90px,
    radial-gradient(circle at 90% 75%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 110px 110px,
    radial-gradient(circle at 25% 65%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 150px 150px,
    radial-gradient(circle at 55% 80%, rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px) 0 0 / 130px 130px,
    radial-gradient(circle at 85% 45%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 160px 160px,
    radial-gradient(circle at 50% 15%, rgba(255, 255, 255, 0.4) 2px, transparent 2px) 0 0 / 220px 220px,
    radial-gradient(circle at 15% 45%, rgba(255, 255, 255, 0.35) 2px, transparent 2px) 0 0 / 260px 260px,
    radial-gradient(circle at 75% 60%, rgba(255, 255, 255, 0.4) 2.5px, transparent 2.5px) 0 0 / 300px 300px,
    linear-gradient(to bottom, #020813 0%, #051429 40%, #0b2b4e 65%, #103b66 100%);
    
  color:white;
  background-attachment: fixed;
  overflow-x: hidden;
  position: relative;
}

/* 🔥 떨어지는 별똥별 효과 */
.shooting-stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}
.star {
  position: absolute;
  top: -50px;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
  animation: animateStar 4s linear infinite;
  opacity: 0;
}
.star::before {
  content: '';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 150px;
  height: 1px;
  background: linear-gradient(90deg, #fff, transparent);
}
.star:nth-child(1) { left: 30%; animation-delay: 0s; animation-duration: 3s; }
.star:nth-child(2) { left: 60%; animation-delay: 1.5s; animation-duration: 4.5s; }
.star:nth-child(3) { left: 80%; animation-delay: 3s; animation-duration: 3.5s; }

@keyframes animateStar {
  0% { transform: rotate(-45deg) translateX(0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: rotate(-45deg) translateX(-1000px); opacity: 0; }
}

/* 🔥 강하고 역동적인 바다 물결 컨테이너 */
.ocean { 
  height: 180px; /* 전체적인 바다 높이 상향 */
  width: 100%;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #103b66;
  box-shadow: 0 -20px 50px rgba(11, 43, 78, 0.8);
  z-index: -1;
}
.wave {
  /* SVG 파도 곡선의 굴곡을 더 가파르고 깊게 수정 */
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C150,120 350,-10 500,50 C650,120 850,-10 1000,50 C1150,120 1300,50 1300,50 L1300,120 L0,120 Z" style="fill:%23103b66; opacity:0.35;"/></svg>') repeat-x;
  position: absolute;
  top: -85px; /* 파도가 높이 치솟도록 위치 조절 */
  width: 6400px;
  height: 90px; /* 개별 파도 높이 확대 */
  animation: waveMoving 10s linear infinite, waveRolling 3s ease-in-out infinite alternate;
}
.wave:nth-of-type(2) {
  top: -70px;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C150,110 350,0 500,50 C650,110 850,0 1000,50 C1150,110 1300,50 1300,50 L1300,120 L0,120 Z" style="fill:%23144775; opacity:0.5;"/></svg>') repeat-x;
  animation: waveMoving 7s linear -1.5s infinite, waveRolling 2.5s ease-in-out infinite alternate;
}
.wave:nth-of-type(3) {
  top: -50px;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C150,100 350,10 500,50 C650,100 850,10 1000,50 C1150,100 1300,50 1300,50 L1300,120 L0,120 Z" style="fill:%230b2b4e; opacity:1;"/></svg>') repeat-x;
  animation: waveMoving 5s linear -0.5s infinite, waveRolling 2s ease-in-out infinite alternate;
}

@keyframes waveMoving {
  0% { transform: translateX(0); }
  100% { transform: translateX(-1600px); } /* 좌우로 빠르게 치는 파도 */
}
@keyframes waveRolling {
  0% { transform: translateY(0); }
  100% { transform: translateY(-28px); } /* 위아래 일렁임 폭을 2배 이상 키워 강한 물결 연출 */
}

/* 기본 UI 구성 요소 */
.header{ text-align:center; padding:30px 20px; }
.header h1{
  margin:0; font-size:36px; font-weight: bold;
  text-shadow: 0 0 15px rgba(0, 188, 212, 0.8), 0 0 4px rgba(255, 255, 255, 0.6);
}
.sub{ margin-top:10px; font-size:16px; opacity:0.85; letter-spacing: 2px; }
.card{ width:85%; max-width: 800px; margin:20px auto; padding-bottom: 220px; } /* 파도가 높아진 만큼 여백 추가 확보 */
.controls{ text-align:center; margin-bottom:25px; }

input, select{
  padding:10px 12px; margin:5px; border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius:8px; background: rgba(255, 255, 255, 0.12); color: white; outline: none; transition: all 0.3s;
}
input:focus, select:focus { background: rgba(255, 255, 255, 0.2); border-color: #00bcd4; }
input::placeholder { color: rgba(255, 255, 255, 0.5); }
select option { background: #051429; color: white; }

button{
  padding:9px 15px; margin:5px; border:none; border-radius:8px;
  background: linear-gradient(135deg, #00bcd4, #0097a7); color:white; font-weight: bold;
  cursor:pointer; box-shadow: 0 2px 8px rgba(0, 188, 212, 0.4); transition: all 0.3s;
}
button:hover{ transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 188, 212, 0.6); }

.post{
  background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}
.post h3 { margin: 0 0 8px 0; font-size: 20px; }
.post small { color: rgba(255, 255, 255, 0.6); }
.post p{ white-space:pre-wrap; margin-top:15px; line-height: 1.6; color: rgba(255, 255, 255, 0.95); }
.post button { background: rgba(255, 255, 255, 0.15); box-shadow: none; font-weight: normal; font-size: 13px; padding: 5px 10px; }
.post button:hover { background: rgba(255, 255, 255, 0.25); box-shadow: none; }

/* 페이지네이션 디자인 */
.pagination {
  text-align: center;
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 5px;
}
.pagination button {
  background: rgba(255, 255, 255, 0.1);
  box-shadow: none;
  font-weight: normal;
  padding: 6px 12px;
}
.pagination button.active {
  background: #00bcd4;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
}
.pagination button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div class="shooting-stars">
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="ocean">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<div class="header">
  <h1>🌟 나의 사랑하는 별에게 🌟</h1>
  <div class="sub">우리의 빛나는 글들</div>
</div>

<div class="card">
  <div class="controls">
    <input id="searchTitle" placeholder="글 제목">
    <input id="searchWriter" placeholder="글 쓴 사람">
    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>
    <button onclick="
      localStorage.removeItem('editId');
      location.href='admin.html';
    ">
      글 쓰러가기
    </button>
  </div>

  <div id="posts"></div>
  
  <div id="pagination" class="pagination"></div>
</div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let posts = [];

/* 페이징 변수 선언 */
let currentPage = 1;
const postsPerPage = 5;

/* 실시간 데이터 */
onSnapshot(
  collection(db,"posts"),
  (snap)=>{
    posts = [];
    snap.forEach((d)=>{
      const data = d.data();
      if(!data.title && !data.content){
        return;
      }
      posts.push({
        id:d.id,
        writer:data.writer || "",
        title:data.title || "",
        content:data.content || "",
        date:data.date || "",
        time:Number(data.time) || 0,
        pinned:data.pinned || false
      });
    });
    render();
  }
);

/* 렌더 함수 */
function render(){
  const box = document.getElementById("posts");
  const pageBox = document.getElementById("pagination");
  box.innerHTML = "";
  pageBox.innerHTML = "";
  
  let list = [...posts];

  const titleKeyword = document.getElementById("searchTitle").value.trim().toLowerCase();
  const writerKeyword = document.getElementById("searchWriter").value.trim().toLowerCase();
  const sort = document.getElementById("sort").value;
  const user = sessionStorage.getItem("user");

  if(titleKeyword){
    list = list.filter(p=> p.title.toLowerCase().includes(titleKeyword) );
  }

  if(writerKeyword){
    list = list.filter(p=> p.writer.toLowerCase().includes(writerKeyword) );
  }

  list.sort((a,b)=>{
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    if(sort === "new"){ return b.time - a.time; }
    return a.time - b.time;
  });

  if(list.length === 0){ return; }

  /* 5개 단위 데이터 쪼개기(페이징 계산) */
  const totalPages = Math.ceil(list.length / postsPerPage);
  if(currentPage > totalPages) currentPage = totalPages || 1;

  const startIndex = (currentPage - 1) * postsPerPage;
  const endIndex = startIndex + postsPerPage;
  const paginatedList = list.slice(startIndex, endIndex);

  /* 화면에 출력 (잘라진 5개 데이터만) */
  paginatedList.forEach((p)=>{
    const div = document.createElement("div");
    div.className = "post";
    let html = "";

    html += `<h3>${p.pinned ? "📌 " : ""}${p.title}</h3>`;
    html += `<small>${p.writer} · ${p.date}</small>`;

    if(p.content){
      html += `<p>${p.content}</p>`;
    }

    if(p.writer === user){
      html += `
        <button onclick="edit('${p.id}')">수정</button>
        <button onclick="del('${p.id}','${p.writer}')">삭제</button>
        <button onclick="pin('${p.id}', ${p.pinned})">${p.pinned ? "고정해제" : "고정"}</button>
      `;
    }
    div.innerHTML = html;
    box.appendChild(div);
  });

  /* 페이지네이션 버튼 생성기 */
  if (totalPages > 1) {
    const prevBtn = document.createElement("button");
    prevBtn.innerText = "이전";
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => { currentPage--; render(); };
    pageBox.appendChild(prevBtn);

    for (let i = 1; i <= totalPages; i++) {
      const pageBtn = document.createElement("button");
      pageBtn.innerText = i;
      if (i === currentPage) pageBtn.className = "active";
      pageBtn.onclick = () => { currentPage = i; render(); };
      pageBox.appendChild(pageBtn);
    }

    const nextBtn = document.createElement("button");
    nextBtn.innerText = "다음";
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.onclick = () => { currentPage++; render(); };
    pageBox.appendChild(nextBtn);
  }
}

/* 삭제 */
window.del = async (id,writer)=>{
  if(sessionStorage.getItem("user") !== writer){
    alert("본인만 가능");
    return;
  }
  await deleteDoc(doc(db,"posts",id));
};

/* 고정 */
window.pin = async (id,pinned)=>{
  await updateDoc(doc(db,"posts",id), { pinned: !pinned });
};

/* 수정 */
window.edit = (id)=>{
  localStorage.setItem("editId", id);
  location.href = "admin.html";
};

const triggerSearch = () => {
  currentPage = 1;
  render();
};

/* 검색 & 정렬 이벤트 */
document.getElementById("searchTitle").addEventListener("input", triggerSearch);
document.getElementById("searchWriter").addEventListener("input", triggerSearch);
document.getElementById("sort").addEventListener("change", triggerSearch);
</script>

</body>
</html>
