<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];

onSnapshot(collection(db, "posts"), (snap) => {
  allPosts = [];

  snap.forEach(docu => {
    let d = docu.data();
    d.id = docu.id;

    allPosts.push(d);
  });

  render();
});

function render(){

  const user = sessionStorage.getItem("user");
  const box = document.getElementById("posts");
  box.innerHTML = "";

  allPosts.forEach(p => {

    const isOwner = p.writer === user;

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>

      ${isOwner ? `
        <button onclick="editPost('${p.id}')">수정</button>
        <button onclick="deletePost('${p.id}', '${p.writer}')">삭제</button>
        <button onclick="togglePin('${p.id}', '${p.writer}', ${p.pinned || false})">
          ${p.pinned ? "고정 해제" : "고정"}
        </button>
      ` : ""}
    `;

    box.appendChild(div);
  });
}

/* 🔥 삭제 (본인만) */
window.deletePost = async function(id, writer){
  const user = sessionStorage.getItem("user");

  if(user !== writer){
    alert("본인만 삭제 가능");
    return;
  }

  await deleteDoc(doc(db, "posts", id));
};

/* 🔥 고정 (본인만) */
window.togglePin = async function(id, writer, pinned){
  const user = sessionStorage.getItem("user");

  if(user !== writer){
    alert("본인만 고정 가능");
    return;
  }

  await updateDoc(doc(db, "posts", id), {
    pinned: !pinned
  });
};

/* 🔥 수정 이동 */
window.editPost = function(id){

  const post = allPosts.find(p => p.id === id);

  if(!post){
    alert("글을 불러올 수 없음");
    return;
  }

  localStorage.setItem("editId", post.id);
  localStorage.setItem("editTitle", post.title);
  localStorage.setItem("editContent", post.content);

  location.href = "admin.html";
};

</script>
