<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 공간!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  
  /* 🔥 별이 쏟아지는 밤하늘 배경 (물결과 분리하기 위해 고정) */
  background: 
    radial-gradient(circle at 10% 15%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 80px 80px,
    radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 100px 100px,
    radial-gradient(circle at 70% 25%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 90px 90px,
    radial-gradient(circle at 90% 75%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 110px 110px,
    radial-gradient(circle at 25% 65%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 150px 150px,
    radial-gradient(circle at 55% 80%, rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px) 0 0 / 130px 130px,
    radial-gradient(circle at 85% 45%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 160px 160px,
    radial-gradient(circle at 50% 15%, rgba(255, 255, 255, 0.4) 2px, transparent 2px) 0 0 / 220px 220px,
    radial-gradient(circle at 15% 45%, rgba(255, 255, 255, 0.35) 2px, transparent 2px) 0 0 / 260px 260px,
    radial-gradient(circle at 75% 60%, rgba(255, 255, 255, 0.4) 2.5px, transparent 2.5px) 0 0 / 300px 300px,
    linear-gradient(to bottom, #020813 0%, #051429 40%, #0b2b4e 70%, #103b66 100%);
    
  color:white;
  background-attachment: fixed;
  overflow-x: hidden; /* 물결이 좌우로 움직일 때 스크롤바 생김 방지 */
  position: relative;
}

/* 🔥 하단 일렁이는 바다 물결 컨테이너 */
.ocean { 
  height: 140px; /* 물결 높이 */
  width: 100%;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #144775;
  box-shadow: 0 -10px 30px rgba(16, 59, 102, 0.5);
  z-index: -1; /* 글을 가리지 않도록 뒤로 보냄 */
}

/* 개별 물결 곡선 스타일링 */
.wave {
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,60 C150,100 350,20 500,60 C650,100 850,20 1000,60 C1150,100 1300,60 1300,60 L1300,120 L0,120 Z" style="fill:%23144775; opacity:0.5;"/></svg>') repeat-x;
  position: absolute;
  top: -60px;
  width: 6400px;
  height: 60px;
  animation: wave 12s cubic-bezier( 0.36, 0.45, 0.63, 0.53) infinite;
  transform: translate3d(0, 0, 0);
}

/* 두 번째 물결 (엇갈리게 움직여서 입체감 생성) */
.wave:nth-of-type(2) {
  top: -50px;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,60 C150,90 350,30 500,60 C650,90 850,30 1000,60 C1150,90 1300,60 1300,60 L1300,120 L0,120 Z" style="fill:%231c6294; opacity:0.4;"/></svg>') repeat-x;
  animation: wave 9s cubic-bezier( 0.36, 0.45, 0.63, 0.53) -2s infinite;
  opacity: 1;
}

/* 세 번째 앞쪽 물결 */
.wave:nth-of-type(3) {
  top: -40px;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,60 C150,80 350,40 500,60 C650,80 850,40 1000,60 C1150,80 1300,60 1300,60 L1300,120 L0,120 Z" style="fill:%23144775; opacity:1;"/></svg>') repeat-x;
  animation: wave 6s cubic-bezier( 0.36, 0.45, 0.63, 0.53) -1s infinite;
}

/* 물결이 흘러가는 애니메이션 */
@keyframes wave {
  0% { transform: translateX(0); }
  100% { transform: translateX(-1600px); }
}

.header{
  text-align:center;
  padding:30px 20px;
}

.header h1{
  margin:0;
  font-size:36px;
  font-weight: bold;
  text-shadow: 0 0 15px rgba(0, 188, 212, 0.8), 0 0 4px rgba(255, 255, 255, 0.6);
}

.sub{
  margin-top:10px;
  font-size:16px;
  opacity:0.85;
  letter-spacing: 2px;
}

.card{
  width:85%;
  max-width: 800px;
  margin:20px auto;
  padding-bottom: 160px; /* 물결에 글이 파묻히지 않도록 아래쪽 여백 확보 */
}

.controls{
  text-align:center;
  margin-bottom:25px;
}

input, select{
  padding:10px 12px;
  margin:5px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius:8px;
  background: rgba(255, 255, 255, 0.12);
  color: white;
  outline: none;
  transition: all 0.3s;
}

input:focus, select:focus {
  background: rgba(255, 255, 255, 0.2);
  border-color: #00bcd4;
}

input::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

select option {
  background: #051429;
  color: white;
}

button{
  padding:9px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background: linear-gradient(135deg, #00bcd4, #0097a7);
  color:white;
  font-weight: bold;
  cursor:pointer;
  box-shadow: 0 2px 8px rgba(0, 188, 212, 0.4);
  transition: all 0.3s;
}

button:hover{
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0, 188, 212, 0.6);
}

.post{
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}

.post h3 {
  margin: 0 0 8px 0;
  font-size: 20px;
}

.post small {
  color: rgba(255, 255, 255, 0.6);
}

.post p{
  white-space:pre-wrap;
  margin-top:15px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.95);
}

.post button {
  background: rgba(255, 255, 255, 0.15);
  box-shadow: none;
  font-weight: normal;
  font-size: 13px;
  padding: 5px 10px;
}
.post button:hover {
  background: rgba(255, 255, 255, 0.25);
  box-shadow: none;
}
</style>
</head>

<body>

<div class="ocean">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<div class="header">
  <h1>🌟 나의 사랑하는 별에게 🌟</h1>
  <div class="sub">우리의 빛나는 글들</div>
</div>

<div class="card">
  <div class="controls">
    <input id="searchTitle" placeholder="글 제목">
    <input id="searchWriter" placeholder="글 쓴 사람">
    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>
    <button onclick="
      localStorage.removeItem('editId');
      location.href='admin.html';
    ">
      글 쓰러가기
    </button>
  </div>

  <div id="posts"></div>
</div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let posts = [];

/* 🔥 실시간 데이터 */
onSnapshot(
  collection(db,"posts"),
  (snap)=>{
    posts = [];
    snap.forEach((d)=>{
      const data = d.data();
      if(!data.title && !data.content){
        return;
      }
      posts.push({
        id:d.id,
        writer:data.writer || "",
        title:data.title || "",
        content:data.content || "",
        date:data.date || "",
        time:Number(data.time) || 0,
        pinned:data.pinned || false
      });
    });
    render();
  }
);

/* 🔥 렌더 */
function render(){
  const box = document.getElementById("posts");
  box.innerHTML = "";
  let list = [...posts];

  const titleKeyword = document.getElementById("searchTitle").value.trim().toLowerCase();
  const writerKeyword = document.getElementById("searchWriter").value.trim().toLowerCase();
  const sort = document.getElementById("sort").value;
  const user = sessionStorage.getItem("user");

  if(titleKeyword){
    list = list.filter(p=> p.title.toLowerCase().includes(titleKeyword) );
  }

  if(writerKeyword){
    list = list.filter(p=> p.writer.toLowerCase().includes(writerKeyword) );
  }

  list.sort((a,b)=>{
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    if(sort === "new"){ return b.time - a.time; }
    return a.time - b.time;
  });

  if(list.length === 0){ return; }

  /* 🔥 출력 */
  list.forEach((p)=>{
    const div = document.createElement("div");
    div.className = "post";
    let html = "";

    html += `<h3>${p.pinned ? "📌 " : ""}${p.title}</h3>`;
    html += `<small>${p.writer} · ${p.date}</small>`;

    if(p.content){
      html += `<p>${p.content}</p>`;
    }

    if(p.writer === user){
      html += `
        <button onclick="edit('${p.id}')">수정</button>
        <button onclick="del('${p.id}','${p.writer}')">삭제</button>
        <button onclick="pin('${p.id}', ${p.pinned})">${p.pinned ? "고정해제" : "고정"}</button>
      `;
    }
    div.innerHTML = html;
    box.appendChild(div);
  });
}

/* 🔥 삭제 */
window.del = async (id,writer)=>{
  if(sessionStorage.getItem("user") !== writer){
    alert("본인만 가능");
    return;
  }
  await deleteDoc(doc(db,"posts",id));
};

/* 🔥 고정 */
window.pin = async (id,pinned)=>{
  await updateDoc(doc(db,"posts",id), { pinned: !pinned });
};

/* 🔥 수정 */
window.edit = (id)=>{
  localStorage.setItem("editId", id);
  location.href = "admin.html";
};

/* 🔥 검색 & 정렬 이벤트 */
document.getElementById("searchTitle").addEventListener("input", render);
document.getElementById("searchWriter").addEventListener("input", render);
document.getElementById("sort").addEventListener("change", render);
</script>

</body>
</html>
