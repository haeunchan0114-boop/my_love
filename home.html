<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.header h1{
  margin:0;
  font-size:34px;
}

.sub{
  margin-top:8px;
  font-size:15px;
  opacity:0.8;
}

.card{
  width:80%;
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:20px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

button{
  padding:7px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.post p{
  white-space:pre-wrap;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">

  <h1>🌟 나의 사랑하는 별에게 🌟</h1>

  <div class="sub">
    우리의 빛나는 글들
  </div>

</div>

<div class="card">

  <div class="controls">

    <input
      id="searchTitle"
      placeholder="글 검색"
    >

    <input
      id="searchWriter"
      placeholder="글 쓴이 검색"
    >

    <select id="sort">

      <option value="new">
        최신순
      </option>

      <option value="old">
        오래된순
      </option>

    </select>

    <button onclick="
      localStorage.removeItem('editId');
      location.href='admin.html';
    ">
      글 쓰기
    </button>

  </div>

  <div id="posts"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

  apiKey:
  "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",

  authDomain:
  "loveletter-for-you.firebaseapp.com",

  projectId:
  "loveletter-for-you",

  storageBucket:
  "loveletter-for-you.firebasestorage.app",

  messagingSenderId:
  "40216107468",

  appId:
  "1:40216107468:web:b635ba7797490396952569"

};

const app =
  initializeApp(firebaseConfig);

const db =
  getFirestore(app);

let posts = [];

/* 🔥 실시간 데이터 */
onSnapshot(
  collection(db,"posts"),
  (snap)=>{

    posts = [];

    snap.forEach((d)=>{

      const data = d.data();

      // 🔥 내용 없는 이상 데이터 제거
      if(
        !data.title &&
        !data.content
      ){
        return;
      }

      posts.push({

        id:d.id,
        writer:data.writer || "",
        title:data.title || "",
        content:data.content || "",
        date:data.date || "",
        time:Number(data.time) || 0,
        pinned:data.pinned || false

      });

    });

    render();

  }
);

/* 🔥 렌더 */
function render(){

  const box =
    document.getElementById("posts");

  // 무조건 초기화
  box.innerHTML = "";

  let list = [...posts];

  const titleKeyword =
    document
    .getElementById("searchTitle")
    .value
    .trim()
    .toLowerCase();

  const writerKeyword =
    document
    .getElementById("searchWriter")
    .value
    .trim()
    .toLowerCase();

  const sort =
    document
    .getElementById("sort")
    .value;

  const user =
    sessionStorage.getItem("user");

  // 제목 검색
  if(titleKeyword){

    list = list.filter(p=>

      p.title
      .toLowerCase()
      .includes(titleKeyword)

    );
  }

  // 작성자 검색
  if(writerKeyword){

    list = list.filter(p=>

      p.writer
      .toLowerCase()
      .includes(writerKeyword)

    );
  }

  // 🔥 최신순 / 오래된순
  list.sort((a,b)=>{

    // 고정글 우선
    if(a.pinned && !b.pinned)
      return -1;

    if(!a.pinned && b.pinned)
      return 1;

    // 최신순
    if(sort === "new"){
      return b.time - a.time;
    }

    // 오래된순
    return a.time - b.time;

  });

  // 🔥 게시글 없으면 완전 종료
  if(list.length === 0){
    return;
  }

  /* 🔥 출력 */
  list.forEach((p)=>{

    const div =
      document.createElement("div");

    div.className = "post";

    let html = "";

    html += `
      <h3>
        ${p.pinned ? "📌 " : ""}
        ${p.title}
      </h3>
    `;

    html += `
      <small>
        ${p.writer}
        ·
        ${p.date}
      </small>
    `;

    // 🔥 내용 있을 때만 추가
    if(p.content){

      html += `
        <p>${p.content}</p>
      `;
    }

    // 🔥 본인만 버튼
    if(p.writer === user){

      html += `

        <button
          onclick="edit('${p.id}')"
        >
          수정
        </button>

        <button
          onclick="
            del(
              '${p.id}',
              '${p.writer}'
            )
          "
        >
          삭제
        </button>

        <button
          onclick="
            pin(
              '${p.id}',
              ${p.pinned}
            )
          "
        >
          ${
            p.pinned
            ? "고정해제"
            : "고정"
          }
        </button>

      `;
    }

    div.innerHTML = html;

    box.appendChild(div);

  });

}

/* 🔥 삭제 */
window.del = async (id,writer)=>{

  if(
    sessionStorage.getItem("user")
    !== writer
  ){
    alert("본인만 가능");
    return;
  }

  await deleteDoc(
    doc(db,"posts",id)
  );

};

/* 🔥 고정 */
window.pin = async (id,pinned)=>{

  await updateDoc(
    doc(db,"posts",id),
    {
      pinned: !pinned
    }
  );

};

/* 🔥 수정 */
window.edit = (id)=>{

  localStorage.setItem(
    "editId",
    id
  );

  location.href =
    "admin.html";
};

/* 🔥 검색 & 정렬 */
document
.getElementById("searchTitle")
.addEventListener(
  "input",
  render
);

document
.getElementById("searchWriter")
.addEventListener(
  "input",
  render
);

document
.getElementById("sort")
.addEventListener(
  "change",
  render
);

</script>

</body>
</html>
