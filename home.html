<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px auto;
  width:80%;
  border-radius:15px;
}
</style>

</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">
  <h1>🌟 나의 사랑하는 별에게 🌟</h1>
</div>

<div id="posts"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "너 API키",
  authDomain: "너 authDomain",
  projectId: "너 projectId",
  storageBucket: "너 storageBucket",
  messagingSenderId: "너 senderId",
  appId: "너 appId"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const q = query(collection(db, "posts"), orderBy("date","desc"));

onSnapshot(q, (snapshot) => {

  const box = document.getElementById("posts");
  box.innerHTML = "";

  snapshot.forEach(doc => {
    const p = doc.data();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>
    `;

    box.appendChild(div);
  });
});
</script>

</body>
</html>
