<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.card{
  width:80%;
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:15px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

.post p{
  white-space:pre-wrap;
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
}

#pagination button{
  margin:3px;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">
  <div style="font-size:34px;font-weight:bold;">
    🌟 나의 사랑하는 별에게 🌟
  </div>
  <div style="font-size:16px;opacity:0.8;">
    우리의 빛나는 글들
  </div>
</div>

<div class="card">

  <div class="controls">
    <input id="search" placeholder="제목 / 작성자">
    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>
    <button onclick="location.href='admin.html'">글 쓰러가기!</button>
  </div>

  <div id="posts"></div>
</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "너 API키",
  authDomain: "너 authDomain",
  projectId: "너 projectId",
  storageBucket: "너 storageBucket",
  messagingSenderId: "너 senderId",
  appId: "너 appId"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];

const col = collection(db, "posts");

// 🔥 실시간 데이터 받기
onSnapshot(col, (snapshot) => {
  allPosts = [];

  snapshot.forEach(doc => {
    allPosts.push(doc.data());
  });

  render();
});

let currentPage = 1;
const perPage = 3;

// 🔥 기존 UI 그대로 유지 render
function render(reset=true){

  let posts = [...allPosts];

  let user = sessionStorage.getItem("user");
  let keyword = document.getElementById("search").value;
  let sort = document.getElementById("sort").value;

  if(reset) currentPage = 1;

  // 검색
  if(keyword){
    posts = posts.filter(p =>
      (p.title || "").includes(keyword) ||
      (p.writer || "").includes(keyword)
    );
  }

  // 정렬
  posts.sort((a,b)=>{
    let ta = new Date(a.date).getTime();
    let tb = new Date(b.date).getTime();

    return sort === "new" ? tb - ta : ta - tb;
  });

  const box = document.getElementById("posts");
  box.innerHTML = "";

  let start = (currentPage-1)*perPage;
  let page = posts.slice(start, start+perPage);

  page.forEach(p=>{

    const isOwner = (p.writer === user);

    const div = document.createElement("div");
    div.className="post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>
    `;

    box.appendChild(div);
  });

  renderPage(posts.length);
}

// 페이지네이션 (그대로 유지)
function renderPage(total){

  let pages = Math.ceil(total/perPage);

  let old = document.getElementById("pagination");
  if(old) old.remove();

  const div = document.createElement("div");
  div.id="pagination";
  div.style.textAlign="center";

  for(let i=1;i<=pages;i++){
    let btn=document.createElement("button");
    btn.innerText=i;
    btn.onclick=()=>{
      currentPage=i;
      render(false);
    };
    div.appendChild(btn);
  }

  document.body.appendChild(div);
}

// 이벤트 유지
document.getElementById("search").oninput=()=>render(true);
document.getElementById("sort").onchange=()=>render(true);

</script>

</body>
</html>
