<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>나의 사랑하는 별에게</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.card{
  width:80%;
  margin:20px auto;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
  box-shadow: 0 0 15px rgba(0,200,255,0.2);
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
button:hover{
  background:#009bb0;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">나의 사랑하는 별에게</div>

<div class="card">
  <button onclick="location.href='admin.html'">글 작성</button>
  <div id="posts"></div>
</div>

<script>
function loadPosts(){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");
  const box = document.getElementById("posts");

  box.innerHTML = "";

  posts.forEach((p, i)=>{
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.content}</p>
      <button onclick="edit(${i})">수정</button>
      <button onclick="del(${i})">삭제</button>
    `;

    box.appendChild(div);
  });
}

function del(i){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");
  posts.splice(i,1);
  localStorage.setItem("posts", JSON.stringify(posts));
  loadPosts();
}

function edit(i){
  let posts = JSON.parse(localStorage.getItem("posts") || "[]");

  localStorage.setItem("editIndex", i);
  localStorage.setItem("editTitle", posts[i].title);
  localStorage.setItem("editContent", posts[i].content);

  location.href="admin.html";
}

loadPosts();
</script>

</body>
</html>
