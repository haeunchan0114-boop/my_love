<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.card{
  width:80%;
  margin:auto;
}

.controls{
  text-align:center;
  margin-bottom:10px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
}

button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <h1>게시판</h1>
</div>

<div class="card">

  <div class="controls">
    <input id="searchTitle" placeholder="제목">
    <input id="searchWriter" placeholder="작성자">

    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>

    <button onclick="location.href='admin.html'">글 쓰러가기!</button>
  </div>

  <div id="posts"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let posts = [];

onSnapshot(collection(db,"posts"), snap=>{
  posts = [];
  snap.forEach(d=>{
    posts.push({ id:d.id, ...d.data() });
  });
  render();
});

function render(){

  const box = document.getElementById("posts");
  box.innerHTML = "";

  const t = document.getElementById("searchTitle").value;
  const w = document.getElementById("searchWriter").value;
  const sort = document.getElementById("sort").value;
  const user = sessionStorage.getItem("user");

  let list = [...posts];

  if(t) list = list.filter(p => p.title.includes(t));
  if(w) list = list.filter(p => p.writer.includes(w));

  list.sort((a,b)=>{
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    return sort==="new" ? b.time - a.time : a.time - b.time;
  });

  list.forEach(p=>{

    const div = document.createElement("div");
    div.className="post";

    div.innerHTML = `
      <h3>${p.pinned ? "📌 " : ""}${p.title}</h3>
      <small>${p.writer} · ${p.date}</small>
      <p>${p.content}</p>

      ${p.writer === user ? `
        <button onclick="edit('${p.id}')">수정</button>
        <button onclick="del('${p.id}','${p.writer}')">삭제</button>
        <button onclick="pin('${p.id}',${p.pinned})">
          ${p.pinned ? "고정해제" : "고정"}
        </button>
      ` : ""}
    `;

    box.appendChild(div);
  });
}

window.del = async (id,writer)=>{
  if(sessionStorage.getItem("user")!==writer) return alert("본인만 가능");
  await deleteDoc(doc(db,"posts",id));
};

window.pin = async (id,pinned)=>{
  await updateDoc(doc(db,"posts",id),{
    pinned: !pinned
  });
};

window.edit = (id)=>{
  localStorage.setItem("editId",id);
  location.href="admin.html";
};

document.getElementById("searchTitle").oninput = render;
document.getElementById("searchWriter").oninput = render;
document.getElementById("sort").onchange = render;

</script>

</body>
</html>
