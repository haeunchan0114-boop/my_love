<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보는 곳!</title>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
}

.card{
  width:80%;
  margin:20px auto;
}

.controls{
  text-align:center;
  margin-bottom:15px;
}

input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.post{
  background: rgba(255,255,255,0.12);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
}

button{
  margin-right:5px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00bcd4;
  color:white;
}

#pagination button{
  margin:3px;
}
</style>
</head>

<body>

<script>
if(sessionStorage.getItem("auth") !== "ok"){
  location.href="index.html";
}
</script>

<div class="header">
  <div style="font-size:34px;font-weight:bold;">
    🌟 나의 사랑하는 별에게 🌟
  </div>
  <div style="font-size:16px;opacity:0.8;">
    우리의 빛나는 글들
  </div>
</div>

<div class="card">

  <div class="controls">
    <input id="search" placeholder="제목 / 작성자">
    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
    </select>
    <button onclick="location.href='admin.html'">글 쓰러가기!</button>
  </div>

  <div id="posts"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh_KpWKjSO4vl-jKjhrJCbLZNIZmek4Qw",
  authDomain: "loveletter-for-you.firebaseapp.com",
  projectId: "loveletter-for-you",
  storageBucket: "loveletter-for-you.firebasestorage.app",
  messagingSenderId: "40216107468",
  appId: "1:40216107468:web:b635ba7797490396952569"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];

// 🔥 실시간 받기
onSnapshot(collection(db, "posts"), (snap) => {
  allPosts = [];

  snap.forEach(doc => {
    let d = doc.data();

    // ⭐ 안전 처리 (글 안 뜨는 문제 해결 핵심)
    d.title = d.title || "";
    d.content = d.content || "";
    d.writer = d.writer || "";
    d.date = d.date || "";
    d.time = d.time || new Date(d.date || Date.now()).getTime();

    allPosts.push(d);
  });

  render();
});

let currentPage = 1;
const perPage = 3;

function render(reset=true){

  try{

    let posts = [...allPosts];

    const keyword = document.getElementById("search").value;
    const sort = document.getElementById("sort").value;

    if(reset) currentPage = 1;

    if(keyword){
      posts = posts.filter(p =>
        p.title.includes(keyword) ||
        p.writer.includes(keyword)
      );
    }

    posts.sort((a,b)=>{
      const ta = Number(a.time) || 0;
      const tb = Number(b.time) || 0;

      return sort === "new" ? tb - ta : ta - tb;
    });

    const box = document.getElementById("posts");
    box.innerHTML = "";

    const start = (currentPage-1)*perPage;
    const page = posts.slice(start, start+perPage);

    page.forEach(p=>{
      const div = document.createElement("div");
      div.className="post";

      div.innerHTML = `
        <h3>${p.title}</h3>
        <small>${p.writer} · ${p.date}</small>
        <p>${p.content}</p>
      `;

      box.appendChild(div);
    });

    renderPage(posts.length);

  } catch(e){
    console.log(e);
  }
}

function renderPage(total){

  let pages = Math.ceil(total/perPage);

  let old = document.getElementById("pagination");
  if(old) old.remove();

  const div = document.createElement("div");
  div.id="pagination";
  div.style.textAlign="center";

  for(let i=1;i<=pages;i++){
    let btn=document.createElement("button");
    btn.innerText=i;
    btn.onclick=()=>{currentPage=i;render(false);};
    div.appendChild(btn);
  }

  document.body.appendChild(div);
}

// 이벤트
document.getElementById("search").oninput=()=>render(true);
document.getElementById("sort").onchange=()=>render(true);

</script>

</body>
</html>
