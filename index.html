<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.card{
  background: rgba(255,255,255,0.12);
  padding:30px;
  border-radius:15px;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 🔥 핵심: 전부 같은 길이 */
input, button{
  width:240px;
  padding:10px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

/* input 따로 스타일 */
input{
  outline:none;
}

/* 버튼 */
button{
  background:#00bcd4;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#009bb0;
}
</style>
</head>

<body>

<div class="title">나의 빛나는 별에게</div>

<div class="card">
  <input id="name" placeholder="이름">
  <input type="password" id="pw" placeholder="비밀번호">

  <button onclick="login()">시작하기</button>
</div>

<script>
function login(){
  const name = document.getElementById("name").value;
  const pw = document.getElementById("pw").value;

  if(pw === "0416"){
    sessionStorage.setItem("auth","ok");
    sessionStorage.setItem("user",name);

    location.href="home.html";
  } else {
    alert("비밀번호 틀림");
  }
}
</script>

</body>
</html>
