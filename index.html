<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.card{
  background: rgba(255,255,255,0.12);
  padding:30px;
  border-radius:15px;
  text-align:center;
}
input,button{
  width:200px;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}
button{
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div style="font-size:28px;font-weight:bold;margin-bottom:20px;">
나의 빛나는 별에게
</div>

<div class="card">
  <input id="name" placeholder="이름">
  <input type="password" id="pw" placeholder="비밀번호">
  <button onclick="login()">입장</button>
</div>

<script>
function login(){
  const name = document.getElementById("name").value;

  if(document.getElementById("pw").value === "0416"){
    sessionStorage.setItem("auth","ok");
    sessionStorage.setItem("user",name); // 🔥 핵심
    location.href="home.html";
  } else {
    alert("비밀번호 틀림");
  }
}
</script>

</body>
</html>
