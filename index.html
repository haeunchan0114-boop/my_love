<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
  min-height:100vh;
  background-attachment: fixed;
}

.card{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow: 0 0 20px rgba(0,200,255,0.3);
}

input,button{
  width:200px;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#00bcd4;
  color:white;
  cursor:pointer;
}
button:hover{
  background:#009bb0;
}
</style>
</head>

<body>

<div class="card">
  <h2>로그인</h2>
  <input type="password" id="pw" placeholder="비밀번호">
  <br>
  <button onclick="login()">입장</button>
</div>

<script>
function login(){
  let user = prompt("이름 입력");

  if(document.getElementById("pw").value === "0416"){
    sessionStorage.setItem("auth","ok");
    sessionStorage.setItem("user", user || "익명");
    location.href="home.html";
  } else {
    alert("비밀번호가 틀렸어!");
  }
}
</script>

</body>
</html>
