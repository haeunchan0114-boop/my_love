<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인 창!!</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  
  /* 🔥 메인 화면과 완벽히 일치하는 무수한 별빛 밤하늘 배경 */
  background: 
    radial-gradient(circle at 10% 15%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 80px 80px,
    radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 100px 100px,
    radial-gradient(circle at 70% 25%, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 90px 90px,
    radial-gradient(circle at 90% 75%, rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 110px 110px,
    radial-gradient(circle at 25% 65%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 150px 150px,
    radial-gradient(circle at 55% 80%, rgba(255, 255, 255, 0.25) 1.5px, transparent 1.5px) 0 0 / 130px 130px,
    radial-gradient(circle at 85% 45%, rgba(255, 255, 255, 0.3) 1.5px, transparent 1.5px) 0 0 / 160px 160px,
    radial-gradient(circle at 50% 15%, rgba(255, 255, 255, 0.4) 2px, transparent 2px) 0 0 / 220px 220px,
    radial-gradient(circle at 15% 45%, rgba(255, 255, 255, 0.35) 2px, transparent 2px) 0 0 / 260px 260px,
    radial-gradient(circle at 75% 60%, rgba(255, 255, 255, 0.4) 2.5px, transparent 2.5px) 0 0 / 300px 300px,
    linear-gradient(to bottom, #020813 0%, #051429 40%, #0b2b4e 75%, #103b66 100%);
    
  color:white;
  overflow: hidden;
  position: relative;
}

/* 🔥 떨어지는 별똥별 효과 */
.shooting-stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}
.star {
  position: absolute;
  top: -50px;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
  animation: animateStar 4s linear infinite;
  opacity: 0;
}
.star::before {
  content: '';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 150px;
  height: 1px;
  background: linear-gradient(90deg, #fff, transparent);
}
.star:nth-child(1) { left: 15%; animation-delay: 0s; animation-duration: 3s; }
.star:nth-child(2) { left: 45%; animation-delay: 1.5s; animation-duration: 4.5s; }
.star:nth-child(3) { left: 75%; animation-delay: 3s; animation-duration: 3.5s; }

@keyframes animateStar {
  0% { transform: rotate(-45deg) translateX(0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: rotate(-45deg) translateX(-1000px); opacity: 0; }
}

.title{
  font-size:32px;
  font-weight:bold;
  margin-bottom:25px;
  text-shadow: 0 0 15px rgba(0, 188, 212, 0.8), 0 0 4px rgba(255, 255, 255, 0.6);
}

.card{
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 35px 30px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

input, button{
  width: 260px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  box-sizing: border-box;
  font-size: 14px;
  transition: all 0.3s;
}

input {
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.12);
  color: white;
  outline: none;
}
input:focus {
  background: rgba(255, 255, 255, 0.2);
  border-color: #00bcd4;
}
input::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

button{
  background: linear-gradient(135deg, #00bcd4, #0097a7);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0, 188, 212, 0.4);
  margin-top: 5px;
}
button:hover{
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0, 188, 212, 0.6);
}

/* 💖 절대 차단되지 않는 커스텀 환영 팝업창(모달) 스타일 */
.custom-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: rgba(13, 35, 67, 0.95);
  border: 2px solid #00bcd4;
  padding: 35px 30px;
  border-radius: 16px;
  width: 260px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0, 188, 212, 0.5);
  animation: popIn 0.3s ease-out;
}
.modal-text {
  font-size: 18px;
  font-weight: bold;
  line-height: 1.6;
  margin-bottom: 22px;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
}
.modal-btn {
  background: linear-gradient(135deg, #00bcd4, #0097a7);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 8px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0, 188, 212, 0.3);
  transition: all 0.2s;
}
.modal-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0, 188, 212, 0.5);
}
@keyframes popIn {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="shooting-stars">
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="title">🌟 나의 사랑하는 별에게 🌟</div>

<div class="card">
  <input id="name" placeholder="이름">
  <input type="password" id="pw" placeholder="비밀번호">
  <button onclick="login()">시작하기</button>
</div>

<div id="welcomeModal" class="custom-modal">
  <div class="modal-content">
    <div id="modalText" class="modal-text"></div>
    <button id="modalCloseBtn" class="modal-btn">입장하기 ✨</button>
  </div>
</div>

<script>
function login(){
  const name = document.getElementById("name").value.trim();
  const pw = document.getElementById("pw").value;

  if(!name || !pw){
    alert("이름과 비밀번호를 입력해줘!");
    return;
  }

  if(pw === "0416"){
    sessionStorage.setItem("auth","ok");
    sessionStorage.setItem("user",name);
    
    const modal = document.getElementById("welcomeModal");
    const modalText = document.getElementById("modalText");
    const modalBtn = document.getElementById("modalCloseBtn");

    /* 🔥 [이름 조건 체크 후 커스텀 팝업 띄우기] */
    if (name === "아시" || name.toLowerCase() === "asi") {
      modalText.innerText = "오빠 환영해 🥰";
    } else {
      modalText.innerText = `${name}님, 환영합니다! 💫`;
    }

    // 모달 보여주기
    modal.style.display = "flex";

    // 팝업 내부의 버튼을 누르면 그 때 메인 화면으로 이동!
    modalBtn.onclick = function() {
      modal.style.display = "none";
      location.href = "home.html";
    };

  } else {
    alert("비밀번호가 틀렸어~ 다시 시도해줘!");
  }
}

// 편의를 위해 비밀번호 입력 후 엔터 쳐도 작동하게 추가!
document.getElementById("pw").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    login();
  }
});
</script>

</body>
</html>
