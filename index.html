<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  color:white;

  /* 🔥 배경 안정화 */
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  background-repeat:no-repeat;
  background-attachment:fixed;
}

.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.card{
  background: rgba(255,255,255,0.12);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input,button{
  width:200px;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#00bcd4;
  color:white;
}
</style>
</head>

<body>

<div class="title">나의 빛나는 별에게</div>

<div class="card">
  <h2>로그인</h2>
  <input type="password" id="pw" placeholder="비밀번호">
  <br>
  <button onclick="login()">시작하기</button>
</div>

<script>
function login(){
  if(document.getElementById("pw").value === "0416"){
    sessionStorage.setItem("auth","ok");
    location.href="home.html";
  } else {
    alert("비밀번호가 틀렸어! 다시 시도해줘~!");
  }
}
</script>

</body>
</html>
