<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인 창!!</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  background: linear-gradient(to bottom, #061a2b, #0d3b66, #145da0);
  color:white;
}

.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.card{
  background: rgba(255,255,255,0.12);
  padding:30px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input,button{
  width:240px;
  padding:10px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

button{
  background:#00bcd4;
  color:white;
}
</style>
</head>

<body>

<div class="title">🌟 나의 사랑하는 별에게 🌟</div>

<div class="card">
  <input id="name" placeholder="이름">
  <input type="password" id="pw" placeholder="비밀번호">
  <button onclick="login()">시작하기</button>
</div>

<script>
function login(){
  const name = document.getElementById("name").value;
  const pw = document.getElementById("pw").value;

  if(!name || !pw){
    alert("이름과 비밀번호 입력");
    return;
  }

  if(pw === "0416"){
    sessionStorage.setItem("auth","ok");
    sessionStorage.setItem("user",name);
    location.href="home.html";
  } else {
    alert("비밀번호가 틀렸어~ 다시 시도해줘!");
  }
}
</script>

</body>
</html>
